<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AetherReview | AI Peer Review</title>
<meta name="description" content="Run a four-agent AI review pass on technical documents, specs, papers, or code. Bring your own key and use AetherReview as an operator-side quality gate." />
<meta property="og:title" content="AetherReview | AI Peer Review" />
<meta property="og:description" content="A BYOK review lane for technical documents: mathematical rigor, code-to-spec consistency, novelty, and clarity in one governed operator tool." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://aethermoorgames.com/demos/aether-review.html" />
<meta property="og:image" content="https://aethermoorgames.com/static/showcase/book_cover.jpg" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="AetherReview | AI Peer Review" />
<meta name="twitter:description" content="Paste a document, bring your own API key, and run four focused review agents against it." />
<link rel="canonical" href="https://aethermoorgames.com/demos/aether-review.html" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; }
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }
.navlink { color: #64748b; font-size: 11px; text-decoration: none; }
.navlink:hover { color: #e2e8f0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef } = React;

const AGENTS = [
  {
    id: "math", name: "Mathematical Rigor", icon: "\u2211", color: "#a78bfa",
    desc: "Verifies proofs, formulas, and mathematical claims",
    prompt: `You are a mathematical rigor reviewer. Analyze this technical document for:
1. Are all mathematical formulas internally consistent?
2. Do proofs follow logically? Are there gaps?
3. Are constants used correctly (e.g., phi vs 1.5, pi vs e)?
4. Are there domain errors (division by zero, log of negative, etc.)?
5. Do numerical examples match the formulas they claim to demonstrate?
6. Are there unstated assumptions?

For each finding, output JSON (no markdown fences):
{"findings": [{"severity": "critical|warning|info|pass", "title": "short title", "detail": "explanation", "location": "where in doc", "suggestion": "how to fix"}], "summary": "2-3 sentence overall assessment", "score": 0-100}`
  },
  {
    id: "consistency", name: "Code-to-Spec Consistency", icon: "\u27F7", color: "#22d3ee",
    desc: "Checks if implementation matches specification claims",
    prompt: `You are a code-to-specification consistency reviewer. Analyze this technical document for:
1. Do code snippets match the mathematical formulas described in prose?
2. Are function signatures consistent with how they're called/referenced?
3. Do variable names in code match the symbols in equations?
4. Are there parameter order mismatches between spec and implementation?
5. Do threshold values in code match the thresholds described in text?
6. Are there features described in spec but missing from code (or vice versa)?

For each finding, output JSON (no markdown fences):
{"findings": [{"severity": "critical|warning|info|pass", "title": "short title", "detail": "explanation", "location": "where in doc", "suggestion": "how to fix"}], "summary": "2-3 sentence overall assessment", "score": 0-100}`
  },
  {
    id: "novelty", name: "Novelty & Prior Art", icon: "\uD83D\uDD0D", color: "#f59e0b",
    desc: "Assesses originality and flags known prior work",
    prompt: `You are a novelty and prior art reviewer. Analyze this technical document for:
1. What are the core novel claims? Are they clearly stated?
2. Are there well-known techniques being presented as novel?
3. Does the author cite or acknowledge related work?
4. Are there obvious prior art gaps (known algorithms, papers, patents)?
5. What is genuinely original vs incremental improvement?

For each finding, output JSON (no markdown fences):
{"findings": [{"severity": "critical|warning|info|pass", "title": "short title", "detail": "explanation", "location": "where in doc", "suggestion": "how to fix"}], "summary": "2-3 sentence overall assessment", "score": 0-100}`
  },
  {
    id: "clarity", name: "Clarity & Communication", icon: "\uD83D\uDCD6", color: "#34d399",
    desc: "Evaluates readability and presentation quality",
    prompt: `You are a technical writing clarity reviewer. Analyze this document for:
1. Is the structure logical? Does it flow well?
2. Are key terms defined before use?
3. Are there ambiguous statements that could be misinterpreted?
4. Is the notation consistent throughout?
5. Would a knowledgeable reader in the field understand the claims?
6. Are diagrams/examples sufficient to support understanding?

For each finding, output JSON (no markdown fences):
{"findings": [{"severity": "critical|warning|info|pass", "title": "short title", "detail": "explanation", "location": "where in doc", "suggestion": "how to fix"}], "summary": "2-3 sentence overall assessment", "score": 0-100}`
  },
];

const SEV_CONFIG = {
  critical: { color: "#ef4444", bg: "#451a1a", label: "CRITICAL", icon: "\u2715" },
  warning: { color: "#f59e0b", bg: "#451a00", label: "WARNING", icon: "\u26A0" },
  info: { color: "#3b82f6", bg: "#1e2a4a", label: "INFO", icon: "\u2139" },
  pass: { color: "#34d399", bg: "#0a2e1f", label: "PASS", icon: "\u2713" },
};

async function runAgent(agent, docText) {
  try {
    const apiKey = prompt("Enter your Anthropic API key to run the review (BYOK):");
    if (!apiKey) return { findings: [{ severity: "info", title: "Skipped", detail: "No API key provided", location: "N/A", suggestion: "Provide an API key to run this agent" }], summary: "Review skipped - no API key", score: null };
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: agent.prompt, messages: [{ role: "user", content: "Review this document:\n\n" + docText.slice(0, 12000) }] }),
    });
    const data = await res.json();
    const raw = (data.content || []).map(b => b.text || "").join("");
    return JSON.parse(raw.replace(/```json|```/g, "").trim());
  } catch (err) {
    return { findings: [{ severity: "warning", title: "Review Error", detail: "Agent error: " + err.message, location: "N/A", suggestion: "Try a shorter document" }], summary: "Review could not complete.", score: null };
  }
}

function ScoreRing({ score, color, size = 52 }) {
  const r = (size - 8) / 2, circ = 2 * Math.PI * r;
  const pct = score != null ? score / 100 : 0;
  const fill = score == null ? "#475569" : score >= 80 ? "#34d399" : score >= 50 ? "#f59e0b" : "#ef4444";
  return React.createElement("svg", { width: size, height: size },
    React.createElement("circle", { cx: size/2, cy: size/2, r, fill: "none", stroke: "#1e293b", strokeWidth: 4 }),
    React.createElement("circle", { cx: size/2, cy: size/2, r, fill: "none", stroke: fill, strokeWidth: 4, strokeDasharray: `${pct*circ} ${circ}`, transform: `rotate(-90 ${size/2} ${size/2})`, strokeLinecap: "round", style: { transition: "stroke-dasharray 0.8s ease" } }),
    React.createElement("text", { x: size/2, y: size/2+1, textAnchor: "middle", dominantBaseline: "middle", fill, fontSize: size > 40 ? 14 : 11, fontFamily: "monospace", fontWeight: "700" }, score != null ? score : "\u2014")
  );
}

function FindingCard({ f }) {
  const sev = SEV_CONFIG[f.severity] || SEV_CONFIG.info;
  const [open, setOpen] = useState(f.severity === "critical");
  return (
    <div style={{ background: sev.bg, border: `1px solid ${sev.color}33`, borderRadius: 8, padding: "8px 10px", marginBottom: 6 }}>
      <div onClick={() => setOpen(!open)} style={{ cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
        <span style={{ color: sev.color, fontSize: 12, fontWeight: 700, width: 16, textAlign: "center" }}>{sev.icon}</span>
        <span style={{ color: sev.color, fontSize: 9, fontFamily: "monospace", padding: "1px 5px", background: `${sev.color}22`, borderRadius: 3 }}>{sev.label}</span>
        <span style={{ color: "#e2e8f0", fontSize: 12, flex: 1 }}>{f.title}</span>
        <span style={{ color: "#64748b", fontSize: 10 }}>{open ? "\u25BE" : "\u25B8"}</span>
      </div>
      {open && (
        <div style={{ marginTop: 6, paddingLeft: 22, fontSize: 11 }}>
          <div style={{ color: "#cbd5e1", lineHeight: 1.5 }}>{f.detail}</div>
          {f.location && f.location !== "N/A" && <div style={{ color: "#64748b", marginTop: 3, fontSize: 10 }}>{"\uD83D\uDCCD"} {f.location}</div>}
          {f.suggestion && <div style={{ color: "#34d399", marginTop: 4, padding: "4px 8px", background: "#0a2e1f", borderRadius: 4, fontSize: 10 }}>{"\uD83D\uDCA1"} {f.suggestion}</div>}
        </div>
      )}
    </div>
  );
}

function AgentPanel({ agent, result, status }) {
  const findings = result?.findings || [];
  const critCount = findings.filter(f => f.severity === "critical").length;
  const warnCount = findings.filter(f => f.severity === "warning").length;
  const passCount = findings.filter(f => f.severity === "pass").length;
  return (
    <div style={{ background: "#111827", border: `1px solid ${agent.color}33`, borderRadius: 10, padding: 12, flex: 1, minWidth: 280 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 20 }}>{agent.icon}</span>
          <div>
            <div style={{ color: agent.color, fontSize: 13, fontWeight: 700 }}>{agent.name}</div>
            <div style={{ color: "#64748b", fontSize: 9 }}>{agent.desc}</div>
          </div>
        </div>
        {status === "done" && <ScoreRing score={result?.score} color={agent.color} />}
        {status === "running" && <div style={{ color: agent.color, fontSize: 11, fontFamily: "monospace", animation: "pulse 1.5s infinite" }}>Reviewing...</div>}
      </div>
      {status === "done" && result && (
        <>
          <div style={{ color: "#94a3b8", fontSize: 11, lineHeight: 1.5, marginBottom: 8, padding: "6px 8px", background: "#0f172a", borderRadius: 6 }}>{result.summary}</div>
          {(critCount > 0 || warnCount > 0 || passCount > 0) && (
            <div style={{ display: "flex", gap: 8, marginBottom: 8, fontSize: 10, fontFamily: "monospace" }}>
              {critCount > 0 && <span style={{ color: "#ef4444" }}>{"\u2715"} {critCount} critical</span>}
              {warnCount > 0 && <span style={{ color: "#f59e0b" }}>{"\u26A0"} {warnCount} warnings</span>}
              {passCount > 0 && <span style={{ color: "#34d399" }}>{"\u2713"} {passCount} passed</span>}
            </div>
          )}
          <div style={{ maxHeight: 300, overflowY: "auto" }}>{findings.map((f, i) => <FindingCard key={i} f={f} />)}</div>
        </>
      )}
      {status === "idle" && <div style={{ color: "#334155", fontSize: 11, fontStyle: "italic", textAlign: "center", padding: 16 }}>Waiting for document...</div>}
    </div>
  );
}

function App() {
  const [doc, setDoc] = useState("");
  const [docTitle, setDocTitle] = useState("");
  const [agentResults, setAgentResults] = useState({});
  const [agentStatus, setAgentStatus] = useState({});
  const [reviewing, setReviewing] = useState(false);
  const [activeTab, setActiveTab] = useState("input");
  const [selectedAgents, setSelectedAgents] = useState(["math", "consistency"]);
  const fileRef = useRef(null);

  const toggleAgent = (id) => setSelectedAgents(prev => prev.includes(id) ? prev.filter(a => a !== id) : [...prev, id]);

  const handleFile = useCallback(async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setDocTitle(file.name);
    try { setDoc(await file.text()); } catch { setDoc("[Could not read file]"); }
  }, []);

  const startReview = useCallback(async () => {
    if (!doc.trim() || reviewing) return;
    setReviewing(true); setActiveTab("results"); setAgentResults({});
    const agents = AGENTS.filter(a => selectedAgents.includes(a.id));
    const newStatus = {}; agents.forEach(a => { newStatus[a.id] = "running"; }); setAgentStatus({ ...newStatus });
    await Promise.all(agents.map(async (agent) => {
      const result = await runAgent(agent, doc);
      setAgentResults(prev => ({ ...prev, [agent.id]: result }));
      setAgentStatus(prev => ({ ...prev, [agent.id]: "done" }));
    }));
    setReviewing(false);
  }, [doc, reviewing, selectedAgents]);

  const activeAgents = AGENTS.filter(a => selectedAgents.includes(a.id));
  const completedResults = Object.values(agentResults);
  const avgScore = completedResults.length > 0 ? Math.round(completedResults.reduce((s, r) => s + (r?.score || 0), 0) / completedResults.length) : null;
  const totalFindings = completedResults.reduce((s, r) => s + (r?.findings?.length || 0), 0);
  const verdict = avgScore == null ? null : avgScore >= 80 ? "ACCEPT" : avgScore >= 50 ? "REVISE" : "REJECT";
  const verdictColor = verdict === "ACCEPT" ? "#34d399" : verdict === "REVISE" ? "#f59e0b" : "#ef4444";

  return (
    <div style={{ background: "#0a0e1a", color: "#e2e8f0", minHeight: "100vh", fontFamily: "'Segoe UI',system-ui,sans-serif" }}>
      <div style={{ borderBottom: "1px solid #1e293b", padding: "10px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 32, height: 32, borderRadius: 8, background: "linear-gradient(135deg, #7c3aed, #a78bfa)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 900, color: "#fff" }}>A</div>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#a78bfa", letterSpacing: 1 }}>AETHERREVIEW</div>
            <div style={{ fontSize: 9, color: "#64748b" }}>AI Peer Review &middot; aethermoorgames.com</div>
            <div style={{ marginTop: 4, maxWidth: 520, color: "#94a3b8", fontSize: 10, lineHeight: 1.45 }}>Operator-side quality gate for specs, papers, patent drafts, and code. Bring your own API key, route the document through four review agents, and use the findings as a governed second pass.</div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          {verdict && <><ScoreRing score={avgScore} size={38} /><div style={{ color: verdictColor, fontSize: 13, fontWeight: 700, fontFamily: "monospace" }}>{verdict}</div></>}
          <a href="index.html" className="navlink">Demo Lab</a>
          <a href="../index.html" className="navlink">Home</a>
        </div>
      </div>

      <div style={{ display: "flex", gap: 0, borderBottom: "1px solid #1e293b" }}>
        {[{ id: "input", label: "Document" }, { id: "agents", label: "Agents" }, { id: "results", label: `Results${totalFindings > 0 ? ` (${totalFindings})` : ""}` }].map(tab => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ padding: "8px 20px", fontSize: 12, cursor: "pointer", border: "none", fontFamily: "inherit", background: activeTab === tab.id ? "#1e293b" : "transparent", color: activeTab === tab.id ? "#e2e8f0" : "#64748b", borderBottom: activeTab === tab.id ? "2px solid #a78bfa" : "2px solid transparent" }}>{tab.label}</button>
        ))}
      </div>

      <div style={{ padding: 16 }}>
        {activeTab === "input" && (
          <div style={{ maxWidth: 800, margin: "0 auto" }}>
            <div style={{ display: "flex", gap: 8, marginBottom: 12, alignItems: "center" }}>
              <input value={docTitle} onChange={e => setDocTitle(e.target.value)} placeholder="Document title..." style={{ flex: 1, padding: "8px 12px", background: "#111827", border: "1px solid #334155", borderRadius: 8, color: "#e2e8f0", fontSize: 13 }} />
              <input ref={fileRef} type="file" accept=".txt,.md,.py,.ts,.tex,.json" onChange={handleFile} style={{ display: "none" }} />
              <button onClick={() => fileRef.current?.click()} style={{ padding: "8px 14px", background: "#1e293b", color: "#a78bfa", border: "1px solid #334155", borderRadius: 8, cursor: "pointer", fontSize: 12 }}>Upload</button>
            </div>
            <textarea value={doc} onChange={e => setDoc(e.target.value)} placeholder={"Paste your technical document, paper, spec, or code here...\n\nSupports: mathematical proofs, API specs, algorithm descriptions, patent claims, architecture docs, code with comments..."} style={{ width: "100%", minHeight: 400, padding: 14, background: "#111827", border: "1px solid #334155", borderRadius: 10, color: "#e2e8f0", fontSize: 12, fontFamily: "monospace", lineHeight: 1.6, resize: "vertical", boxSizing: "border-box" }} />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10 }}>
              <span style={{ fontSize: 10, color: "#475569", fontFamily: "monospace" }}>{doc.length.toLocaleString()} chars</span>
              <button onClick={startReview} disabled={!doc.trim() || reviewing} style={{ padding: "10px 24px", borderRadius: 8, border: "none", cursor: doc.trim() && !reviewing ? "pointer" : "default", background: doc.trim() && !reviewing ? "linear-gradient(135deg, #7c3aed, #a78bfa)" : "#334155", color: "#fff", fontSize: 13, fontWeight: 700 }}>{reviewing ? "Reviewing..." : `Run Review (${selectedAgents.length} agents)`}</button>
            </div>
          </div>
        )}

        {activeTab === "agents" && (
          <div style={{ maxWidth: 700, margin: "0 auto" }}>
            <div style={{ fontSize: 13, color: "#94a3b8", marginBottom: 12 }}>Select review agents. Each evaluates independently. BYOK (Anthropic API key required).</div>
            {AGENTS.map(agent => {
              const sel = selectedAgents.includes(agent.id);
              return (
                <div key={agent.id} onClick={() => toggleAgent(agent.id)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", marginBottom: 8, background: sel ? `${agent.color}11` : "#111827", border: `1px solid ${sel ? agent.color + "66" : "#1e293b"}`, borderRadius: 10, cursor: "pointer" }}>
                  <div style={{ width: 22, height: 22, borderRadius: 6, border: `2px solid ${sel ? agent.color : "#475569"}`, background: sel ? agent.color : "transparent", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700 }}>{sel ? "\u2713" : ""}</div>
                  <span style={{ fontSize: 22 }}>{agent.icon}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ color: sel ? agent.color : "#94a3b8", fontSize: 13, fontWeight: 600 }}>{agent.name}</div>
                    <div style={{ color: "#64748b", fontSize: 10 }}>{agent.desc}</div>
                  </div>
                </div>
              );
            })}
            <button onClick={startReview} disabled={!doc.trim() || reviewing || selectedAgents.length === 0} style={{ marginTop: 12, padding: "10px 24px", borderRadius: 8, border: "none", cursor: doc.trim() && !reviewing ? "pointer" : "default", background: doc.trim() && !reviewing ? "linear-gradient(135deg, #7c3aed, #a78bfa)" : "#334155", color: "#fff", fontSize: 13, fontWeight: 700 }}>{reviewing ? "Reviewing..." : "Run Review"}</button>
          </div>
        )}

        {activeTab === "results" && (
          <div>
            {completedResults.length > 0 && (
              <div style={{ display: "flex", gap: 16, alignItems: "center", padding: "12px 16px", marginBottom: 16, background: "#111827", borderRadius: 10, border: "1px solid #1e293b", flexWrap: "wrap" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <ScoreRing score={avgScore} size={50} />
                  <div>
                    <div style={{ color: verdictColor, fontSize: 16, fontWeight: 700 }}>{verdict || "PENDING"}</div>
                    <div style={{ color: "#64748b", fontSize: 10 }}>Overall verdict</div>
                  </div>
                </div>
              </div>
            )}
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              {activeAgents.map(agent => <AgentPanel key={agent.id} agent={agent} result={agentResults[agent.id]} status={agentStatus[agent.id] || "idle"} />)}
            </div>
            {Object.keys(agentStatus).length === 0 && <div style={{ textAlign: "center", padding: 60, color: "#334155" }}><div style={{ fontSize: 40, marginBottom: 12 }}>{"\uD83D\uDD2C"}</div><div style={{ fontSize: 14 }}>No results yet. Paste a document and run a review.</div></div>}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
